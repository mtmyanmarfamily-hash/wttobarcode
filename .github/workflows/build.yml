
name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Unzip project
        run: |
          unzip -q WheelTaxBarcode.zip
          ls WheelTaxBarcode

      - name: Build APK
        working-directory: WheelTaxBarcode
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WheelTaxBarcode-v1.0.0
          path: WheelTaxBarcode/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Wheel Tax Barcode v1.0.0
          body: |
            🚗 Wheel Tax Barcode v1.0.0
            ✅ ကားခွန်ပြေစာ ရှေ့/နောက် ဓာတ်ပုံရိုက်ပါ
            ✅ OCR ဖြင့် ကားနံပတ်၊ Chassis၊ ကုန်ဆုံးရက် auto extract
            ✅ Data ပြင်ဆင်နိုင်သည်
            ✅ PDF417 Barcode generate + save + share
          files: WheelTaxBarcode/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
